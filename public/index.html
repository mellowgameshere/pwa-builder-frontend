<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PWA Builder</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
        'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
        sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 10px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      max-width: 500px;
      width: 100%;
    }
    h1 {
      color: #333;
      margin-bottom: 10px;
      text-align: center;
    }
    .subtitle {
      color: #666;
      text-align: center;
      margin-bottom: 30px;
      font-size: 14px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }
    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
      transition: border-color 0.3s;
    }
    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }
    button:active {
      transform: translateY(0);
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .message {
      margin-top: 20px;
      padding: 15px;
      border-radius: 5px;
      text-align: center;
      font-size: 14px;
      display: none;
    }
    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }
    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }
    .status {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: #666;
    }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #f3f3f3;
      border-top: 2px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 8px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 PWA Builder</h1>
    <p class="subtitle">Build Progressive Web Apps with ease</p>
    
    <form id="buildForm">
      <div class="form-group">
        <label for="appName">App Name</label>
        <input 
          type="text" 
          id="appName" 
          placeholder="My Awesome App" 
          required
        >
      </div>

      <div class="form-group">
        <label for="packageName">Package Name</label>
        <input 
          type="text" 
          id="packageName" 
          placeholder="com.example.app" 
          required
        >
      </div>

      <div class="form-group">
        <label for="webUrl">Web URL</label>
        <input 
          type="url" 
          id="webUrl" 
          placeholder="https://example.com" 
          required
        >
      </div>

      <button type="submit" id="submitBtn">Build PWA</button>
    </form>

    <div id="message" class="message"></div>
    <div id="status" class="status"></div>
  </div>

  <script>
    const form = document.getElementById('buildForm');
    const messageDiv = document.getElementById('message');
    const statusDiv = document.getElementById('status');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const appName = document.getElementById('appName').value;
      const packageName = document.getElementById('packageName').value;
      const webUrl = document.getElementById('webUrl').value;

      submitBtn.disabled = true;
      statusDiv.innerHTML = '<span class="spinner"></span>Building...';
      messageDiv.className = 'message';

      try {
        const response = await fetch('/api/build', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ appName, packageName, webUrl })
        });

        const data = await response.json();

        if (response.ok) {
          messageDiv.className = 'message success';
          messageDiv.textContent = '✓ Build triggered successfully! Check your GitHub releases.';
          form.reset();
        } else {
          messageDiv.className = 'message error';
          messageDiv.textContent = '✗ Error: ' + (data.message || 'Failed to trigger build');
        }
      } catch (error) {
        messageDiv.className = 'message error';
        messageDiv.textContent = '✗ Connection error: ' + error.message;
      } finally {
        submitBtn.disabled = false;
        statusDiv.innerHTML = '';
      }
    });

    // Test backend connection
    fetch('/api/test')
      .then(r => r.json())
      .then(data => {
        statusDiv.textContent = '✓ Backend connected';
        statusDiv.style.color = '#28a745';
      })
      .catch(err => {
        statusDiv.textContent = '⚠ Backend not available';
        statusDiv.style.color = '#dc3545';
      });
  </script>
</body>
</html>
